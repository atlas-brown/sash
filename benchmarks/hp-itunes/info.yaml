name: iTunes updater

sources:
  - https://apple.slashdot.org/comments.pl?sid=23365&cid=2518563

bugs:
  bug00:
    description: Unquoted variable in rm can word-split and delete arbitrary files
    code: word_split
    shellcheck: SC2086

  bug01:
    description: Variable is equal to /usr
    code: del_sys_file
    shellcheck: null

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [5] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [5] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [5], shellcheck: null }

  # Variants
  - path: variants/bug-split_rm_args.sh
    kind: buggy_variant
    bugs:
      bug01: { lines: [7] }
