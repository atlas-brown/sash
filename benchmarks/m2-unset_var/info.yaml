  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [6], shellcheck: null }

  # Variants
  - path: variants/bug-assign_later.sh
    kind: buggy_variant
    bugs:
      bug00: { lines: [6], shellcheck: null }
