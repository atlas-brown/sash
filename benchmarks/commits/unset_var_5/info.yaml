sources:
  - https://github.com/nvm-sh/nvm/commit/5904d41b253e03d7ad0f3b58ce081e46e44f3c9a

bugs:
  bug00:
    description: An unset variable is used ($_source)
    code: unbound
    shellcheck: SC2153

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [85] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [85] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [85], shellcheck: null }

  # Variants
  - path: variants/bug-assign_later.sh
    kind: buggy_variant
    bugs:
      bug00: { lines: [85], shellcheck: null }
