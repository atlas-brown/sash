sources:
  - https://github.com/ocaml/opam/issues/3316
  - https://github.com/camlp5/camlp5/commit/d5616932193a05d4cffeb46deda7c003f9e38aca#diff-b67911656ef5d18c4ae36cb6741b7965

bugs:
  bug00:
    description: If some externally-set variables are not set, root gets deleted
    code: del_sys_file
    shellcheck: SC2115

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [52, 58] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [74, 79] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [82, 95] }

  # Variants
  - path: variants/bug-assign_first.sh
    kind: buggy_variant
    bugs:
      bug00: { lines: [83, 90] }
