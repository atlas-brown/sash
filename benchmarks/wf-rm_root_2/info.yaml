name: AIX server data gather

sources:
  - https://www.shellscript.sh/examples/rm-rf/

bugs:
  bug00:
    description: If TEMPDIR is empty, will delete root
    code: word_split_del_sys_file
    shellcheck: SC2115

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [24] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [24] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [24], shellcheck: null }

  # Variants
  - path: variants/bug-move_trailing_slash.sh
    kind: buggy_variant
    bugs:
      bug00: { lines: [24], shellcheck: null }

  - path: variants/fix-if_z_exit.sh
    kind: fixed_variant
    bugs:
      bug00: { regression_lines: [25], shellcheck: null }
