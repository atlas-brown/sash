name: MongoDB backup script

sources:
  - https://stackoverflow.com/questions/55323391/deleted-database-accidentally-by-a-bash-script-rescue-please

bugs:
  bug00:
    description: Wrong comment delimiter in assignment causes // to be interpreted as a command
    code: not_a_command
    shellcheck: SC1127
  bug01:
    description: An unset variable is used
    code: unbound
    shellcheck: SC2154
  bug02:
    description: Unquoted variable in rm can word-split and delete arbitrary files
    code: word_split
    shellcheck: SC2086
  bug03:
    description: Everything under / is deleted because of an unset variable
    code: del_sys_file
    shellcheck: SC2115

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [3, 4, 5, 6, 7, 8, 9] }
      bug01: { lines: [10, 12, 13, 13, 13, 14, 14, 15] }
      bug02: { lines: [11] }
      bug03: { lines: [11, 11] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [3, 4, 5, 6, 7, 8, 9] }
      bug01: { lines: [10, 12, 13, 13, 13, 14, 14, 15] }
      bug02: { lines: [11] }
      bug03: { lines: [11, 11] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [3, 4, 5, 6, 7, 8, 9], shellcheck: null }
      bug01:
        { regression_lines: [10, 12, 13, 13, 13, 14, 14, 15], shellcheck: null }
      bug02: { regression_lines: [11], shellcheck: null }
      bug03: { regression_lines: [11, 11], shellcheck: null }
