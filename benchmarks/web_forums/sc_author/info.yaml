sources:
  - https://github.com/koalaman/shellcheck/issues/910

bugs:
  bug00:
    description: Detected issue code 'cmd_expected_path_state' in benchmark script
    code: cmd_expected_path_state
    shellcheck: null
  bug01:
    description: Detected issue code 'del_sys_file' in benchmark script
    code: del_sys_file
    shellcheck: null

ground_truths:
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [1] }
      bug01: { lines: [1, 2] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [1] }
      bug01: { lines: [1, 2] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [1], shellcheck: null }
      bug01: { regression_lines: [1, 2], shellcheck: null }
