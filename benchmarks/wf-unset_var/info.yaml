description: File check

sources:
  - https://stackoverflow.com/questions/26526776/bash-variable-defaulting-doesnt-work-if-followed-by-pipe-bash-bug

bugs:
  bug00:
    description: An unset variable is used
    code: unbound
    shellcheck: SC2031

ground_truths:
  # Base versions
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [5] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [5] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [5], shellcheck: null }

  # Variants
  - path: variants/bug-set_in_func.sh
    kind: buggy_variant
    bugs:
      bug00: { lines: [5], shellcheck: null }
