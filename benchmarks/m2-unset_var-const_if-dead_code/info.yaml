  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [6] }
      bug01: { lines: [6] }
      bug02: { lines: [10] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [6] }
      bug01: { lines: [6] }
      bug02: { lines: [10] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [6], shellcheck: null }
      bug01: { regression_lines: [6], shellcheck: null }
      bug02: { regression_lines: [10], shellcheck: null }

  # Variants
  - path: variants/bug-assign_later.sh
    kind: buggy_variant
