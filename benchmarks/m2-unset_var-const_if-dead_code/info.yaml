name: Rsync directory copy script

sources:
  - https://stackoverflow.com/questions/48706718/error-with-bash-script-using-rsync-to-copy-directory-with-space-in-directory-nam

bugs:
  bug00:
    description: An unset variable is used ($directorytocopy)
    code: unbound
    shellcheck: SC2154
  bug01:
    description: If condition is constant assuming that $directorytocopy is unset
    code: conc_const_cond
    shellcheck: null
    notes:
      - This is only relevant for an environment concretization mode (out-of-scope for now)
  bug02:
    description: Dead code from early exit assuming that $directorytocopy is unset
    code: conc_dead_code
    shellcheck: null
    notes:
      - This is only relevant for an environment concretization mode (out-of-scope for now)

ground_truths:
