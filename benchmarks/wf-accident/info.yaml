sources:
  - https://www.hivelocity.net/blog/human-error-is-the-leading-cause-of-business-data-loss/
  - https://unix.stackexchange.com/questions/101237/how-to-recover-files-i-deleted-now-by-running-rm

bugs:
  bug00:
    description: Detected issue code 'cmd_expected_path_state' in benchmark script
    code: cmd_expected_path_state
    shellcheck: null
  bug01:
    description: Detected issue code 'del_sys_file' in benchmark script
    code: del_sys_file
    shellcheck: null

ground_truths:
  - path: original.sh
    kind: original
    bugs:
      bug00: { lines: [4] }
      bug01: { lines: [3, 4] }

  - path: posix.sh
    kind: buggy
    bugs:
      bug00: { lines: [3] }
      bug01: { lines: [2, 3] }

  - path: fixed.sh
    kind: fixed
    bugs:
      bug00: { regression_lines: [4], shellcheck: null }
      bug01: { regression_lines: [3, 4], shellcheck: null }
