name: Run evaluation
on:
  workflow_run:
    workflows: [Run tests]
    types: [completed]
    branches: [master]
jobs:
  on-success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync
      - name: Run the evaluation
        run: |
          uv run scripts/evaluation.py -t 30 -T 30
